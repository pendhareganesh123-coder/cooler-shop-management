<!DOCTYPE html>
<html>
<head>
  <title>Sales / Billing - Cooler Shop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f4f6f9;
    }
    .section-title {
      font-weight: 600;
    }
    .bill-box {
      background: #fff;
      border-radius: 10px;
      padding: 20px;
    }
    .total-box {
      font-size: 1.4rem;
      font-weight: bold;
      color: #198754;
    }
  </style>
</head>

<body>
  <a href="sales-history.html" class="btn btn-outline-dark mt-3 w-100">
  📜 View All Sales History
</a>
<div class="container-fluid mt-4 px-4">

  <h3 class="mb-4">🧾 Sales / Billing</h3>

  <div class="row">

    <!-- LEFT : SALE DETAILS -->
    <div class="col-md-7">
      <div class="card shadow-sm mb-4">
        <div class="card-body">
          <h6 class="section-title mb-3">💳 Sale Details</h6>

          <!-- CUSTOMER -->
          <label class="form-label">Customer</label>
          <select id="customer" class="form-control mb-3">
            <option value="">Select Customer</option>
          </select>

          <!-- COOLER -->
          <label class="form-label">Cooler</label>
          <select id="cooler" class="form-control mb-3">
            <option value="">Select Cooler</option>
          </select>

          <div class="row">
            <div class="col-md-4">
              <label class="form-label">Price</label>
              <input id="price" class="form-control" readonly>
            </div>

            <div class="col-md-4">
              <label class="form-label">Quantity</label>
              <input id="qty" type="number" class="form-control">
            </div>

            <div class="col-md-4">
              <label class="form-label">Total</label>
              <input id="total" class="form-control total-box" readonly>
            </div>
          </div>

          <button onclick="makeSale()" class="btn btn-success w-100 mt-4">
            ✅ Complete Sale & Generate Bill
          </button>

        </div>
      </div>
    </div>

    <!-- RIGHT : BILL PREVIEW -->
    <div class="col-md-5">
      <div class="card shadow-sm">
        <div class="card-body">
          <h6 class="section-title mb-3">🧾 Bill Preview</h6>

          <div class="bill-box">
            <p><strong>Customer:</strong> <span id="prevCustomer">-</span></p>
            <p><strong>Cooler:</strong> <span id="prevCooler">-</span></p>
            <p><strong>Quantity:</strong> <span id="prevQty">-</span></p>
            <hr>
            <p class="total-box">
              Total: ₹ <span id="prevTotal">0</span>
            </p>
          </div>

          <p class="text-muted mt-3 small">
            * Bill will open automatically after sale
          </p>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
const API = "http://localhost:3000";
let coolersData = [];

/* ===== LOAD CUSTOMERS ===== */
fetch(API + "/customers")
  .then(res => res.json())
  .then(data => {
    let opt = `<option value="">Select Customer</option>`;
    data.forEach(c => {
      opt += `<option value="${c.id}">${c.name}</option>`;
    });
    customer.innerHTML = opt;
  });

/* ===== LOAD COOLERS ===== */
function loadCoolers() {
  fetch(API + "/coolers")
    .then(res => res.json())
    .then(data => {
      coolersData = data;
      let opt = `<option value="">Select Cooler</option>`;
      data.forEach(c => {
        opt += `<option value="${c.id}">
          ${c.brand} - ${c.model_name} (Stock: ${c.quantity})
        </option>`;
      });
      cooler.innerHTML = opt;
    });
}
loadCoolers();

/* ===== PRICE + PREVIEW ===== */
cooler.addEventListener("change", () => {
  const c = coolersData.find(x => x.id == cooler.value);
  price.value = c ? c.price : "";
  qty.value = total.value = "";
  prevCooler.innerText = c ? `${c.brand} ${c.model_name}` : "-";
});

qty.addEventListener("input", () => {
  total.value = price.value * qty.value;
  prevQty.innerText = qty.value || "-";
  prevTotal.innerText = total.value || 0;
});

customer.addEventListener("change", () => {
  prevCustomer.innerText =
    customer.options[customer.selectedIndex].text || "-";
});

/* ===== MAKE SALE ===== */
function makeSale() {
  if (!customer.value || !cooler.value || !qty.value) {
    alert("Please select customer, cooler and quantity");
    return;
  }

  const selected = coolersData.find(c => c.id == cooler.value);

  if (qty.value > selected.quantity) {
    alert("Not enough stock available!");
    return;
  }

  fetch(API + "/sales", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      customer_id: customer.value,
      cooler_id: cooler.value,
      quantity: qty.value,
      total_price: total.value,
      profit: total.value * 0.2
    })
  }).then(() => {

    window.open(
      `bill.html?customer=${encodeURIComponent(
        customer.options[customer.selectedIndex].text
      )}&brand=${encodeURIComponent(selected.brand)}
      &model=${encodeURIComponent(selected.model_name)}
      &qty=${qty.value}
      &price=${price.value}
      &total=${total.value}`,
      "_blank"
    );

    alert("Sale Successful!");
    qty.value = price.value = total.value = "";
    loadCoolers();
  });
}
</script>

</body>
</html>
