<!DOCTYPE html>
<html>
<head>
  <title>Customers - Cooler Shop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f4f6f9;
    }
    .section-title {
      font-weight: 600;
    }
  </style>
</head>

<body>
<div class="container-fluid mt-4 px-4">

  <h3 class="mb-4">👥 Customer Management</h3>

  <div class="row">

    <!-- LEFT PANEL : ADD CUSTOMER -->
    <div class="col-md-4">
      <div class="card shadow-sm mb-4">
        <div class="card-body">
          <h6 class="section-title mb-3">➕ Add New Customer</h6>

          <input id="name" class="form-control mb-2" placeholder="Customer Name">
          <input id="phone" class="form-control mb-2" placeholder="Phone Number">
          <input id="email" class="form-control mb-2" placeholder="Email (optional)">
          <textarea id="address" class="form-control mb-3" placeholder="Address"></textarea>

          <button onclick="addCustomer()" class="btn btn-success w-100">
            Add Customer
          </button>
        </div>
      </div>
    </div>

    <!-- RIGHT PANEL : CUSTOMER LIST -->
    <div class="col-md-8">
      <div class="card shadow-sm">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h6 class="section-title mb-0">📋 Customers List</h6>
            <input id="search" class="form-control form-control-sm w-50"
                   placeholder="Search by name or phone"
                   onkeyup="filterCustomers()">
          </div>

          <table class="table table-bordered align-middle text-center">
            <thead class="table-dark">
              <tr>
                <th>Name</th>
                <th>Phone</th>
                <th>Email</th>
                <th>Address</th>
                <th width="160">Action</th>
              </tr>
            </thead>
            <tbody id="customerTable"></tbody>
          </table>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
const API = "http://localhost:3000";
let customersData = [];

/* LOAD CUSTOMERS */
function loadCustomers() {
  fetch(API + "/customers")
    .then(res => res.json())
    .then(data => {
      customersData = data;
      renderCustomers(data);
    });
}

function renderCustomers(data) {
  let rows = "";

  data.forEach(c => {
    rows += `
      <tr>
        <td>${c.name}</td>
        <td>${c.phone}</td>
        <td>${c.email || "-"}</td>
        <td>${c.address || "-"}</td>
        <td>
          <button class="btn btn-sm btn-info mb-1 w-100"
            onclick="viewHistory(${c.id})">
            Purchases
          </button>
          <button class="btn btn-sm btn-danger w-100"
            onclick="deleteCustomer(${c.id})">
            Delete
          </button>
        </td>
      </tr>`;
  });

  document.getElementById("customerTable").innerHTML = rows;
}

/* ADD CUSTOMER */
function addCustomer() {
  const nameInput = document.getElementById("name").value.trim();
  const phoneInput = document.getElementById("phone").value.trim();
  const emailInput = document.getElementById("email").value.trim();
  const addressInput = document.getElementById("address").value.trim();

  if (!nameInput || !phoneInput) {
    alert("Name and phone are required");
    return;
  }

  fetch(API + "/customers", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      name: nameInput,
      phone: phoneInput,
      email: emailInput,
      address: addressInput
    })
  }).then(() => {
    document.getElementById("name").value = "";
    document.getElementById("phone").value = "";
    document.getElementById("email").value = "";
    document.getElementById("address").value = "";
    loadCustomers();
  });
}
/* DELETE CUSTOMER */
function deleteCustomer(id) {
  if (!confirm("Delete this customer?")) return;

  fetch(API + "/customers/" + id, { method: "DELETE" })
    .then(() => loadCustomers());
}

/* VIEW PURCHASE HISTORY */
function viewHistory(customerId) {
  fetch(API + "/sales/customer/" + customerId)
    .then(res => res.json())
    .then(data => {
      if (data.length === 0) {
        alert("No purchases found for this customer.");
        return;
      }

      let msg = "Purchase History:\n\n";
      data.forEach(s => {
        msg += `Brand: ${s.brand}
Model: ${s.model_name}
Quantity: ${s.quantity}
Date: ${s.sale_date}\n\n`;
      });

      alert(msg);
    });
}

/* SEARCH FILTER */
function filterCustomers() {
  const keyword = search.value.toLowerCase();
  const filtered = customersData.filter(c =>
    c.name.toLowerCase().includes(keyword) ||
    c.phone.includes(keyword)
  );
  renderCustomers(filtered);
}

loadCustomers();
</script>

</body>
</html>
