<!DOCTYPE html>
<html>
<head>
  <title>Dashboard - Cooler Shop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .stat-card {
      border-radius: 15px;
    }
    .stat-icon {
      font-size: 30px;
    }
  </style>
</head>

<body class="bg-light">
<div class="container mt-4">

  <h2 class="text-center mb-4">📊 Cooler Shop Dashboard</h2>

  <!-- STATS -->
  <div class="row text-center">

    <div class="col-md-3 mb-3">
      <div class="card shadow stat-card">
        <div class="card-body">
          <div class="stat-icon">📦</div>
          <h6>Total Stock</h6>
          <h2 id="totalStock">0</h2>
        </div>
      </div>
    </div>

    <div class="col-md-3 mb-3">
      <div class="card shadow stat-card">
        <div class="card-body">
          <div class="stat-icon">👥</div>
          <h6>Total Customers</h6>
          <h2 id="totalCustomers">0</h2>
        </div>
      </div>
    </div>

    <div class="col-md-3 mb-3">
      <div class="card shadow stat-card">
        <div class="card-body">
          <div class="stat-icon">🏷️</div>
          <h6>Total Brands</h6>
          <h2 id="totalBrands">0</h2>
        </div>
      </div>
    </div>

    <div class="col-md-3 mb-3">
      <div class="card shadow stat-card bg-success text-white">
        <div class="card-body">
          <div class="stat-icon">🧾</div>
          <h6>Today's Sales</h6>
          <h2 id="todaySales">₹0</h2>
        </div>
      </div>
    </div>

  </div>

  <!-- COOLERS TABLE -->
  <div class="card mt-4 shadow">
    <div class="card-header bg-primary text-white">
      Available Coolers
    </div>
    <div class="card-body">
      <table class="table table-bordered text-center">
        <thead class="table-dark">
          <tr>
            <th>Brand</th>
            <th>Model</th>
            <th>Price</th>
            <th>Stock</th>
          </tr>
        </thead>
        <tbody id="coolerTable"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
const API = "http://localhost:3000";

/* ================= COOLERS + STOCK ================= */
fetch(API + "/coolers")
  .then(res => res.json())
  .then(data => {
    let totalStock = 0;
    let rows = "";

    data.forEach(c => {
      totalStock += c.quantity;
      let color = c.quantity < 5 ? "red" : c.quantity < 10 ? "orange" : "green";

      rows += `
        <tr>
          <td>${c.brand}</td>
          <td>${c.model_name}</td>
          <td>₹${c.price}</td>
          <td style="color:${color}; font-weight:bold">${c.quantity}</td>
        </tr>
      `;
    });

    coolerTable.innerHTML = rows;
    totalStock.innerText = totalStock;
  });

/* ================= CUSTOMERS ================= */
fetch(API + "/customers")
  .then(res => res.json())
  .then(data => {
    totalCustomers.innerText = data.length;
  });

/* ================= BRANDS ================= */
fetch(API + "/brands")
  .then(res => res.json())
  .then(data => {
    totalBrands.innerText = data.length;
  });

/* ================= TODAY SALES ================= */
fetch(API + "/sales/today")
  .then(res => res.json())
  .then(data => {
    todaySales.innerText = "₹" + (data.total || 0);
  });
</script>

</body>
</html>
