<!DOCTYPE html>
<html>
<head>
  <title>Invoice - Indian Cooler Shop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background:#f5f5f5; }
    .invoice-box {
      background: #fff;
      padding: 25px;
      max-width: 800px;
      margin: auto;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }
    .invoice-header {
      border-bottom: 2px solid #000;
      margin-bottom: 20px;
      padding-bottom: 10px;
    }
    .invoice-footer {
      border-top: 1px dashed #aaa;
      margin-top: 20px;
      padding-top: 10px;
      font-size: 14px;
    }
    @media print {
      .no-print { display: none; }
      body { background: #fff; }
    }
  </style>
</head>

<body>

<div class="invoice-box mt-4">

  <!-- HEADER -->
  <div class="invoice-header text-center">
    <h2 class="fw-bold">🧊 Indian Cooler Shop</h2>
    <p class="mb-0">
      New Hanuman Nagar, Lane No. 05,<br>
      N4 CIDCO, Chhatrapati Sambhajinagar
    </p>
  </div>

  <!-- BILL INFO -->
  <div class="row mb-3">
    <div class="col-md-6">
      <strong>Bill No:</strong> <span id="billNo"></span><br>
      <strong>Date:</strong> <span id="billDate"></span>
    </div>
    <div class="col-md-6 text-end">
      <strong>Customer:</strong><br>
      <span id="customerName"></span>
    </div>
  </div>

  <!-- ITEM TABLE -->
  <table class="table table-bordered text-center">
    <thead class="table-dark">
      <tr>
        <th>Brand</th>
        <th>Model</th>
        <th>Qty</th>
        <th>Price</th>
        <th>Total</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td id="brand"></td>
        <td id="model"></td>
        <td id="qty"></td>
        <td>₹<span id="price"></span></td>
        <td>₹<span id="total"></span></td>
      </tr>
    </tbody>
  </table>

  <!-- TOTAL -->
  <div class="text-end mt-3">
    <h4>Total Amount: ₹<span id="grandTotal"></span></h4>
  </div>

  <!-- FOOTER -->
  <div class="invoice-footer text-center">
    <p class="mb-1">Thank you for your purchase 🙏</p>
    <p class="mb-0">For service & support, contact Indian Cooler Shop</p>
  </div>

  <!-- PRINT BUTTON -->
  <div class="text-center mt-4 no-print">
    <button onclick="window.print()" class="btn btn-success px-4">
      🖨️ Print Invoice
    </button>
  </div>

</div>

<script>
  const params = new URLSearchParams(window.location.search);

  const customer = params.get("customer");
  const brand = params.get("brand");
  const model = params.get("model");
  const qty = params.get("qty");
  const price = params.get("price");
  const total = params.get("total");

  document.getElementById("customerName").innerText = customer;
  document.getElementById("brand").innerText = brand;
  document.getElementById("model").innerText = model;
  document.getElementById("qty").innerText = qty;
  document.getElementById("price").innerText = price;
  document.getElementById("total").innerText = total;
  document.getElementById("grandTotal").innerText = total;

  // AUTO BILL NUMBER
  document.getElementById("billNo").innerText =
    "ICS-" + Math.floor(100000 + Math.random() * 900000);

  // DATE & TIME
  document.getElementById("billDate").innerText =
    new Date().toLocaleString();
</script>

</body>
</html>
